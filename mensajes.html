<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED Admin — Mensajes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#0A0A0A; --rojo:#FF4D4D; --azul:#007AFF; }
  body{ background:var(--negro); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  .sidebar{ position:fixed; left:0; top:0; bottom:0; width:220px; background:#111; border-right:1px solid #1e1e1e; padding:28px 16px; z-index:200; display:none; flex-direction:column; gap:4px; }
  @media(min-width:768px){ .sidebar{ display:flex; } body{ padding-left:220px; padding-bottom:20px; } .tab-bar{ display:none; } }
  .sidebar-logo{ display:flex; align-items:center; gap:8px; margin-bottom:28px; padding:0 8px; }
  .sidebar-logo svg{ width:28px; height:28px; }
  .sidebar-logo-text{ font-size:1rem; font-weight:800; color:white; }
  .sidebar-logo-text span{ color:var(--verde); }
  .nav-item{ display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:12px; cursor:pointer; text-decoration:none; color:#555; font-size:0.82rem; font-weight:600; transition:0.2s; }
  .nav-item:hover{ background:#1a1a1a; color:#aaa; }
  .nav-item.active{ background:#1e1e1e; color:white; }
  .nav-item svg{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; flex-shrink:0; }
  .nav-section{ font-size:0.6rem; font-weight:700; color:#333; text-transform:uppercase; letter-spacing:1px; padding:12px 12px 4px; }
  .sidebar-bottom{ margin-top:auto; }
  .btn-logout{ display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:12px; cursor:pointer; color:#555; font-size:0.82rem; font-weight:600; border:none; background:transparent; width:100%; }
  .btn-logout svg{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; }
  .page-header{ padding:48px 20px 20px; display:flex; align-items:center; justify-content:space-between; }
  @media(min-width:768px){ .page-header{ padding:28px 28px 20px; } }
  .page-title{ font-size:1.4rem; font-weight:800; color:white; }
  .page-sub{ font-size:0.8rem; color:#555; margin-top:2px; }
  .btn-nueva{ background:var(--verde); color:var(--negro); border:none; padding:10px 16px; border-radius:12px; font-family:'Inter',sans-serif; font-weight:700; font-size:0.82rem; cursor:pointer; }
  .tabs-row{ display:flex; gap:8px; padding:0 20px 16px; overflow-x:auto; scrollbar-width:none; }
  @media(min-width:768px){ .tabs-row{ padding:0 28px 16px; } }
  .vtab{ padding:8px 16px; border-radius:20px; border:1px solid #222; background:transparent; color:#555; font-size:0.78rem; font-weight:600; cursor:pointer; white-space:nowrap; font-family:'Inter',sans-serif; transition:0.2s; }
  .vtab.active{ background:#1e1e1e; color:white; border-color:#333; }
  .mensajes-lista{ padding:0 20px; }
  @media(min-width:768px){ .mensajes-lista{ padding:0 28px; } }
  .msg-card{ background:#111; border:1px solid #1e1e1e; border-radius:16px; padding:16px; margin-bottom:10px; cursor:pointer; transition:0.2s; }
  .msg-card:hover{ border-color:#333; }
  .msg-card.unread{ border-color:#2a2a2a; background:#131313; }
  .msg-header{ display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .msg-avatar{ width:40px; height:40px; border-radius:12px; background:#1e1e1e; display:flex; align-items:center; justify-content:center; font-size:0.9rem; font-weight:800; flex-shrink:0; }
  .msg-from{ flex:1; }
  .msg-nombre{ font-size:0.88rem; font-weight:700; color:white; }
  .msg-hora{ font-size:0.68rem; color:#444; margin-top:1px; }
  .msg-tipo{ font-size:0.62rem; font-weight:700; padding:2px 8px; border-radius:6px; margin-left:auto; }
  .tipo-notif{ background:rgba(0,122,255,0.15); color:var(--azul); }
  .tipo-disputa{ background:rgba(255,77,77,0.15); color:var(--rojo); }
  .tipo-sistema{ background:rgba(168,230,61,0.12); color:var(--verde); }
  .msg-asunto{ font-size:0.85rem; font-weight:600; color:white; margin-bottom:4px; }
  .msg-preview{ font-size:0.78rem; color:#555; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .msg-footer{ display:flex; gap:8px; margin-top:12px; }
  .msg-btn{ flex:1; padding:8px; border-radius:9px; border:none; font-family:'Inter',sans-serif; font-size:0.74rem; font-weight:600; cursor:pointer; }
  .btn-resp{ background:#1e1e1e; color:#aaa; }
  .btn-resolver{ background:rgba(168,230,61,0.1); color:#3a7a00; }
  .btn-archivar{ background:rgba(255,77,77,0.08); color:var(--rojo); }
  .unread-dot{ width:8px; height:8px; border-radius:50%; background:var(--azul); flex-shrink:0; }

  /* MODAL NUEVA NOTIFICACIÓN */
  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; z-index:500; align-items:flex-end; justify-content:center; }
  .modal-overlay.show{ display:flex; }
  .modal-sheet{ background:#111; width:100%; max-width:600px; border-radius:24px 24px 0 0; padding:24px 20px 36px; transform:translateY(100%); transition:0.4s cubic-bezier(0.16,1,0.3,1); border:1px solid #1e1e1e; border-bottom:none; }
  .modal-overlay.show .modal-sheet{ transform:translateY(0); }
  .drag{ width:36px; height:4px; background:#333; border-radius:4px; margin:0 auto 20px; }
  .modal-title{ font-size:1rem; font-weight:700; color:white; margin-bottom:20px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:0.7rem; font-weight:700; color:#555; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
  .field input,.field textarea,.field select{ width:100%; padding:12px 14px; background:#1a1a1a; border:1px solid #222; border-radius:12px; outline:none; font-family:'Inter',sans-serif; font-size:0.9rem; color:white; -webkit-appearance:none; }
  .field input:focus,.field textarea:focus,.field select:focus{ border-color:var(--verde); }
  .field textarea{ resize:none; height:90px; line-height:1.5; }
  .field select option{ background:#1a1a1a; }
  .btn-enviar{ width:100%; padding:14px; background:var(--verde); color:var(--negro); border:none; border-radius:14px; font-family:'Inter',sans-serif; font-size:0.95rem; font-weight:800; cursor:pointer; margin-top:8px; }

  .empty{ text-align:center; padding:48px 20px; color:#444; font-size:0.85rem; }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:#111; display:flex; justify-content:space-around; align-items:center; padding:10px 0 22px; border-top:1px solid #1e1e1e; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; flex:1; color:#444; text-decoration:none; }
  .tab.active{ color:var(--verde); }
  .tab svg{ width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; }
  .tab span{ font-size:0.52rem; font-weight:600; text-transform:uppercase; }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">
    <svg viewBox="0 0 100 100"><defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#A8E63D"/><stop offset="100%" style="stop-color:#7BC820"/></linearGradient></defs><path d="M50 4 L93 28 V72 L50 96 L7 72 V28 Z" fill="url(#g1)"/><path d="M30 52 L44 66 L70 36" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    <div class="sidebar-logo-text">PRO<span>VEED</span></div>
  </div>
  <div class="nav-section">Principal</div>
  <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
  <a class="nav-item" href="usuarios.html"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Usuarios</a>
  <a class="nav-item" href="productos.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Productos</a>
  <a class="nav-item" href="pedidos.html"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>Pedidos</a>
  <a class="nav-item active" href="mensajes.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Mensajes</a>
  <div class="nav-section">Herramientas</div>
  <a class="nav-item" href="editor.html"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Editor Visual</a>
  <a class="nav-item" href="paginas.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Páginas</a>
  <a class="nav-item" href="biblioteca.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Biblioteca</a>
  <div class="sidebar-bottom">
    <button class="btn-logout" onclick="cerrarSesion()"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar sesión</button>
  </div>
</nav>

<div class="page-header">
  <div>
    <div class="page-title">Mensajes</div>
    <div class="page-sub">Notificaciones, disputas y comunicados</div>
  </div>
  <button class="btn-nueva" onclick="abrirModal()">+ Nueva notificación</button>
</div>

<div class="tabs-row">
  <button class="vtab active" onclick="filtrar('todos',this)">Todos</button>
  <button class="vtab" onclick="filtrar('notificacion',this)">Notificaciones</button>
  <button class="vtab" onclick="filtrar('disputa',this)">Disputas</button>
  <button class="vtab" onclick="filtrar('sistema',this)">Sistema</button>
</div>

<div class="mensajes-lista" id="mensajes-lista">
  <div class="empty">Cargando mensajes...</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal-sheet">
    <div class="drag"></div>
    <div class="modal-title">Nueva Notificación</div>
    <div class="field">
      <label>Destinatarios</label>
      <select id="dest">
        <option value="todos">Todos los usuarios</option>
        <option value="emprendedores">Solo emprendedores</option>
        <option value="proveedores">Solo proveedores</option>
      </select>
    </div>
    <div class="field">
      <label>Tipo</label>
      <select id="tipo-notif">
        <option value="notificacion">Notificación general</option>
        <option value="sistema">Actualización del sistema</option>
        <option value="disputa">Resolución de disputa</option>
      </select>
    </div>
    <div class="field">
      <label>Asunto</label>
      <input type="text" id="asunto" placeholder="Ej: Nueva funcionalidad disponible">
    </div>
    <div class="field">
      <label>Mensaje</label>
      <textarea id="mensaje-texto" placeholder="Escribe tu mensaje aquí..."></textarea>
    </div>
    <button class="btn-enviar" onclick="enviarNotificacion()">ENVIAR NOTIFICACIÓN →</button>
  </div>
</div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Inicio</span></a>
  <a class="tab" href="usuarios.html"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>Usuarios</span></a>
  <a class="tab" href="pedidos.html"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg><span>Pedidos</span></a>
  <a class="tab active" href="mensajes.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Mensajes</span></a>
  <a class="tab" href="editor.html"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg><span>Editor</span></a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, doc, serverTimestamp, orderBy, query } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
  authDomain:"proveed-8cb7c.firebaseapp.com",
  projectId:"proveed-8cb7c",
  storageBucket:"proveed-8cb7c.firebasestorage.app",
  messagingSenderId:"235073250367",
  appId:"1:235073250367:web:89ec59fea5f0b8a347448a"
});
const auth = getAuth(app);
const db = getFirestore(app);
const ADMIN_EMAIL = 'proveed30@gmail.com';
let todosMensajes = [], filtroActual = 'todos';

onAuthStateChanged(auth, user => {
  if (!user || user.email !== ADMIN_EMAIL) { window.location.href = 'index.html'; return; }
  cargarMensajes();
});

async function cargarMensajes() {
  try {
    const snap = await getDocs(query(collection(db, 'notificaciones_admin'), orderBy('creadoEn', 'desc')));
    todosMensajes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMensajes();
  } catch(e) {
    todosMensajes = [];
    renderMensajes();
  }
}

function renderMensajes() {
  let lista = [...todosMensajes];
  if (filtroActual !== 'todos') lista = lista.filter(m => m.tipo === filtroActual);
  const cont = document.getElementById('mensajes-lista');
  if (!lista.length) {
    cont.innerHTML = '<div class="empty">Sin mensajes aún. Crea una notificación.</div>';
    return;
  }
  cont.innerHTML = '';
  lista.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg-card' + (m.leido === false ? ' unread' : '');
    const fecha = m.creadoEn ? new Date(m.creadoEn.toDate()).toLocaleString('es-EC', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '—';
    const tipoClass = m.tipo === 'disputa' ? 'tipo-disputa' : m.tipo === 'sistema' ? 'tipo-sistema' : 'tipo-notif';
    const tipoLabel = m.tipo === 'disputa' ? 'Disputa' : m.tipo === 'sistema' ? 'Sistema' : 'Notificación';
    div.innerHTML = `
      <div class="msg-header">
        <div class="msg-avatar" style="color:var(--verde);">📢</div>
        <div class="msg-from">
          <div class="msg-nombre">Para: ${m.destinatarios || 'Todos'}</div>
          <div class="msg-hora">${fecha}</div>
        </div>
        ${m.leido === false ? '<div class="unread-dot"></div>' : ''}
        <span class="msg-tipo ${tipoClass}">${tipoLabel}</span>
      </div>
      <div class="msg-asunto">${m.asunto || 'Sin asunto'}</div>
      <div class="msg-preview">${m.mensaje || ''}</div>
      <div class="msg-footer">
        <button class="msg-btn btn-resolver" onclick="marcarLeido('${m.id}')">✓ Marcar leído</button>
        <button class="msg-btn btn-archivar" onclick="archivar('${m.id}')">Archivar</button>
      </div>`;
    cont.appendChild(div);
  });
}

window.filtrar = function(f, el) {
  filtroActual = f;
  document.querySelectorAll('.vtab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderMensajes();
};

window.abrirModal = () => document.getElementById('modal-overlay').classList.add('show');
window.cerrarModal = e => { if (e.target === document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('show'); };

window.enviarNotificacion = async function() {
  const asunto = document.getElementById('asunto').value.trim();
  const mensaje = document.getElementById('mensaje-texto').value.trim();
  const dest = document.getElementById('dest').value;
  const tipo = document.getElementById('tipo-notif').value;
  if (!asunto || !mensaje) { alert('Completa todos los campos'); return; }
  try {
    await addDoc(collection(db, 'notificaciones_admin'), { asunto, mensaje, destinatarios: dest, tipo, leido: false, creadoEn: serverTimestamp() });
    document.getElementById('modal-overlay').classList.remove('show');
    document.getElementById('asunto').value = '';
    document.getElementById('mensaje-texto').value = '';
    cargarMensajes();
  } catch(e) { alert('Error: ' + e.message); }
};

window.marcarLeido = async function(id) {
  await updateDoc(doc(db, 'notificaciones_admin', id), { leido: true });
  cargarMensajes();
};

window.archivar = async function(id) {
  await updateDoc(doc(db, 'notificaciones_admin', id), { archivado: true });
  cargarMensajes();
};

window.cerrarSesion = async function() { await signOut(auth); window.location.href = 'index.html'; };
</script>
</body>
</html>
