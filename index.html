<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EQUILIBRIUM: COSMIC STRATEGY</title>
    <style>
        :root {
            --primary: #32ff7e; --danger: #ff3e3e;
            --ocean: #1e90ff; --land: #2ecc71;
            --void: #020205;
        }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body {
            margin: 0; background: var(--void); color: white;
            font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden;
        }

        /* PANTALLA DE CARGA / INICIO */
        #screen-start, #screen-map, #screen-game {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.5s;
        }

        .hidden { display: none !important; }

        /* ESTILO DEL MAPA */
        #screen-map { background: radial-gradient(circle, #1a1a3a 0%, #000 100%); overflow-y: auto; padding: 40px 0; }
        .level-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;
            padding: 20px; max-width: 400px;
        }
        .level-node {
            width: 60px; height: 60px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; cursor: pointer;
        }
        .level-node.unlocked { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 10px var(--primary); }
        .level-node.locked { opacity: 0.3; cursor: not-allowed; }

        /* HUD DEL JUEGO */
        #hud {
            position: absolute; top: 20px; width: 90%; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        #progress-track { position: absolute; top: 90px; width: 80%; height: 6px; background: #222; border-radius: 3px; }
        #progress-fill { width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); border-radius: 3px; }

        /* ELEMENTOS DEL JUEGO */
        #stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        #player {
            position: absolute; width: 65px; height: 65px; z-index: 60;
            left: 50%; top: 50%; transform: translate(-50%, -50%); /* CENTRADO TOTAL */
            filter: drop-shadow(0 0 20px var(--ocean));
        }

        .meteor {
            position: absolute; width: 40px; height: 40px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 10 L80 35 L90 75 L50 95 L10 75 L20 35 Z" fill="%23444" stroke="%23ff6b6b" stroke-width="5"/></svg>');
            background-size: cover; filter: drop-shadow(0 0 10px var(--danger));
        }

        .btn {
            background: var(--primary); color: black; border: none; padding: 15px 40px;
            font-weight: 900; border-radius: 50px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 20px var(--primary); margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="screen-start">
        <h1 style="font-size: 40px; letter-spacing: 5px; color: var(--primary);">EQUILIBRIUM</h1>
        <p style="opacity: 0.6;">COSMIC STRATEGY</p>
        <button class="btn" onclick="showMap()">VER MAPA ESTELAR</button>
    </div>

    <div id="screen-map" class="hidden">
        <h2 style="color: var(--primary);">SISTEMA SOLAR</h2>
        <div class="level-grid" id="level-grid"></div>
        <button class="btn" style="background:#555; color:white; box-shadow:none;" onclick="location.reload()">VOLVER</button>
    </div>

    <div id="screen-game" class="hidden">
        <div id="hud">
            <div id="lvl-tag">NIVEL 1</div>
            <div id="perc-tag">0%</div>
        </div>
        <div id="progress-track"><div id="progress-fill"></div></div>
        
        <div id="stage">
            <div id="player">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="48" fill="var(--ocean)"/>
                    <path d="M25,30 Q35,20 50,25 Q60,15 75,25 L85,45 Q70,60 55,55 Q40,70 25,55 Z" fill="var(--land)"/>
                    <path d="M45,65 Q55,90 35,95 Q20,85 30,70 Z" fill="var(--land)"/>
                </svg>
            </div>
        </div>
    </div>

    <script>
        // Variables de Control
        let currentLvl = 1;
        let unlockedLvls = 1;
        let isPlaying = false;
        let isPhysicsOn = false;
        let playerY, playerX, playerVelY = 0;
        let meteors = [];
        let progress = 0;

        const playerEl = document.getElementById('player');
        const stage = document.getElementById('stage');
        const levelGrid = document.getElementById('level-grid');

        // Configuración de Dificultad
        const getConfig = (lvl) => ({
            gravity: 0.4 + (lvl * 0.04),
            impulse: 16 + (lvl * 0.1),
            target: 400 + (lvl * 250),
            mFreq: 0.02 + (lvl * 0.005)
        });

        // Crear Mapa de 120 Niveles
        function showMap() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-map').classList.remove('hidden');
            levelGrid.innerHTML = '';
            for(let i=1; i<=120; i++) {
                const node = document.createElement('div');
                node.className = `level-node ${i <= unlockedLvls ? 'unlocked' : 'locked'}`;
                node.innerText = i;
                if(i <= unlockedLvls) node.onclick = () => startLevel(i);
                levelGrid.appendChild(node);
            }
        }

        function startLevel(lvl) {
            currentLvl = lvl;
            document.getElementById('screen-map').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            document.getElementById('lvl-tag').innerText = `NIVEL ${lvl}`;
            resetGame();
        }

        function resetGame() {
            isPlaying = true;
            isPhysicsOn = false;
            progress = 0;
            playerVelY = 0;
            // CENTRAR TIERRA
            playerY = window.innerHeight / 2;
            playerX = window.innerWidth / 2;
            updatePlayerPos();
            
            meteors.forEach(m => m.el.remove());
            meteors = [];
            document.getElementById('progress-fill').style.width = '0%';
        }

        function updatePlayerPos() {
            playerEl.style.top = playerY + 'px';
            playerEl.style.left = playerX + 'px';
        }

        function handleInput(e) {
            if(!isPlaying) return;
            if(e.cancelable) e.preventDefault();
            
            if(!isPhysicsOn) {
                isPhysicsOn = true;
                requestAnimationFrame(loop);
            }

            const conf = getConfig(currentLvl);
            playerVelY -= conf.impulse; // Impulso hacia ARRIBA (Y disminuye)

            // Destruir meteoritos cercanos
            const rect = stage.getBoundingClientRect();
            const tx = (e.touches ? e.touches[0].clientX : e.clientX);
            const ty = (e.touches ? e.touches[0].clientY : e.clientY);

            for(let i=meteors.length-1; i>=0; i--) {
                const m = meteors[i];
                const mRect = m.el.getBoundingClientRect();
                const dist = Math.sqrt((tx - (mRect.left+20))**2 + (ty - (mRect.top+20))**2);
                if(dist < 100) {
                    m.el.remove();
                    meteors.splice(i, 1);
                    playerVelY += 2; // Ligereza al destruir
                }
            }
        }

        stage.addEventListener('touchstart', handleInput, {passive: false});
        stage.addEventListener('mousedown', handleInput);

        function loop() {
            if(!isPhysicsOn) return;

            const conf = getConfig(currentLvl);
            
            // Física
            playerVelY += conf.gravity; // La gravedad tira hacia ABAJO (Y aumenta)
            playerVelY *= 0.98;
            playerY += playerVelY;

            updatePlayerPos();

            // Progreso
            if(playerY < window.innerHeight * 0.7) {
                progress++;
                const p = (progress / conf.target) * 100;
                document.getElementById('progress-fill').style.width = p + '%';
                document.getElementById('perc-tag').innerText = Math.floor(p) + '%';
                if(p >= 100) return win();
            }

            // Obstáculos
            if(Math.random() < conf.mFreq) spawnMeteor();
            meteors.forEach((m, i) => {
                m.y += 5;
                m.el.style.top = m.y + 'px';
                if(m.y > window.innerHeight) { m.el.remove(); meteors.splice(i, 1); }
                
                // Colisión
                const pR = playerEl.getBoundingClientRect();
                const mR = m.el.getBoundingClientRect();
                const d = Math.sqrt((pR.left+32 - (mR.left+20))**2 + (pR.top+32 - (mR.top+20))**2);
                if(d < 45) return die();
            });

            // Límites
            if(playerY > window.innerHeight - 50 || playerY < 50) return die();

            requestAnimationFrame(loop);
        }

        function spawnMeteor() {
            const el = document.createElement('div');
            el.className = 'meteor';
            el.style.left = Math.random() * (window.innerWidth - 40) + 'px';
            el.style.top = '-50px';
            stage.appendChild(el);
            meteors.push({el, y: -50});
        }

        function win() {
            isPhysicsOn = false;
            if(currentLvl === unlockedLvls) unlockedLvls++;
            alert("¡NIVEL COMPLETADO!");
            showMap();
            document.getElementById('screen-game').classList.add('hidden');
        }

        function die() {
            isPhysicsOn = false;
            alert("EQUILIBRIO PERDIDO");
            resetGame();
        }

    </script>
</body>
</html>
