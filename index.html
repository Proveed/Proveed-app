<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOCH: COSMIC ASCENSION - BALANCED</title>
    <style>
        :root {
            --bg-deep: #020205; --bg-void: #0a0a1a;
            --primary: #32ff7e; --danger: #ff3e3e;
            --meteor: #ff9f1a; --ball: #ffffff;
        }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body {
            margin: 0; background: var(--bg-deep); color: white;
            font-family: 'Courier New', monospace; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            overflow: hidden;
        }
        #hud {
            margin-top: 20px; text-align: center; width: 90%; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.03); padding: 10px 15px;
            border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }
        #level-txt { font-size: 12px; color: var(--primary); letter-spacing: 2px; }
        #altitude-txt { font-size: 18px; font-weight: bold; }

        #stage {
            position: relative; width: 100vw; height: calc(100vh - 80px);
            margin-top: 10px; overflow: hidden;
            background: radial-gradient(circle at center, var(--bg-void) 0%, var(--bg-deep) 100%);
        }
        #stars-far, #stars-mid, #stars-near { position: absolute; inset: 0; width: 100%; height: 100%; background-repeat: repeat; }
        #death-line { position: absolute; bottom: 0; width: 100%; height: 4px; background: var(--danger); box-shadow: 0 0 15px var(--danger); z-index: 50; }
        #finish-line { position: absolute; top: 60px; width: 100%; height: 4px; background: var(--primary); box-shadow: 0 0 15px var(--primary); z-index: 50; }
        #player-ball {
            position: absolute; width: 38px; height: 38px;
            background: var(--ball); border-radius: 50%;
            box-shadow: 0 0 30px var(--ball), inset 0 0 10px rgba(0,0,0,0.5);
            bottom: calc(100% - 150px); left: 50%; transform: translate(-50%, 0);
            z-index: 60; will-change: bottom;
        }
        .meteor {
            position: absolute; width: 26px; height: 26px;
            background: var(--meteor); border-radius: 3px;
            box-shadow: 0 0 15px var(--meteor), 0 0 30px var(--danger);
            z-index: 40; border: 2px solid rgba(255, 255, 255, 0.2);
        }
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.97);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 30px;
        }
        .btn-start {
            padding: 20px 50px; background: transparent; color: var(--primary);
            border: 2px solid var(--primary); font-weight: 900; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color:var(--primary); font-size: 26px; letter-spacing: 4px;">TOCH: ASCENSION</h1>
        <p style="color:#aaa; margin-bottom: 50px; font-size: 12px; max-width: 320px; line-height: 1.8;">
            LA GRAVEDAD HA SIDO CALIBRADA.<br><br>
            TOCA PARA SUBIR. EL PRIMER TOQUE ACTIVA EL DESCENSO.<br><br>
            DESTRUYE METEORITOS CON TUS PULSOS.
        </p>
        <button class="btn-start" id="startBtn">CALIBRAR Y COMENZAR</button>
    </div>

    <div id="hud">
        <div id="level-txt">VIP-STATION 01</div>
        <div id="altitude-txt">PARSEC: 0.0</div>
    </div>

    <div id="stage">
        <div id="stars-far"></div><div id="stars-mid"></div><div id="stars-near"></div>
        <div id="finish-line"></div>
        <div id="player-ball"></div>
        <div id="death-line"></div>
    </div>

    <script>
        const player = document.getElementById('player-ball');
        const stage = document.getElementById('stage');
        const altitudeTxt = document.getElementById('altitude-txt');
        const startBtn = document.getElementById('startBtn');
        const overlay = document.getElementById('overlay');
        const starsFar = document.getElementById('stars-far'), starsMid = document.getElementById('stars-mid'), starsNear = document.getElementById('stars-near');

        const stageH = stage.offsetHeight, stageW = stage.offsetWidth;
        const playerSize = 38, finishLineY = 64, deathLineY = 4;

        let startBallY = stageH - 150 - playerSize/2;
        let playerY = startBallY, playerVelY = 0;
        let appReady = false, active = false, lastTimestamp = 0;
        let currentAltitude = 0, meteorList = [], starY = { far: 0, mid: 0, near: 0 };

        // --- CALIBRACIÓN DE FÍSICA MEJORADA ---
        const gravity = 0.45;         // MÁS SUAVE (Antes 0.75)
        const tapImpulse = 21;        // MÁS FUERTE (Antes 17)
        const friction = 0.98;        // MÁS FLUIDO (Antes 0.96)
        const meteorSpawnRate = 0.03; 
        const meteorSpeed = 4.0;
        const pulseDestroyRadius = 120;

        generateStars();

        startBtn.onclick = () => {
            overlay.style.display = "none";
            resetGame();
            appReady = true; active = false;
            altitudeTxt.innerText = "ESPERANDO PULSO...";
        };

        function resetGame() {
            playerY = startBallY; playerVelY = 0; currentAltitude = 0;
            meteorList.forEach(m => m.el.remove()); meteorList = [];
            starY = { far: 0, mid: 0, near: 0 };
            player.style.bottom = playerY + "px";
        }

        function generateStars() {
            starsFar.style.backgroundImage = createStarTexture(1, '#333', 100);
            starsMid.style.backgroundImage = createStarTexture(1.5, '#666', 50);
            starsNear.style.backgroundImage = createStarTexture(2, '#999', 20);
        }

        function createStarTexture(size, color, count) {
            let canvas = document.createElement('canvas');
            canvas.width = stageW; canvas.height = stageH;
            let ctx = canvas.getContext('2d');
            ctx.fillStyle = color;
            for (let i = 0; i < count; i++) {
                ctx.beginPath(); ctx.arc(Math.random() * stageW, Math.random() * stageH, size, 0, Math.PI * 2); ctx.fill();
            }
            return `url(${canvas.toDataURL()})`;
        }

        function handleTap(e) {
            if (!appReady) return;
            if (e.cancelable) e.preventDefault();
            if (!active) {
                active = true; lastTimestamp = performance.now();
                requestAnimationFrame(gameLoop);
            }
            playerVelY += tapImpulse;
            let touchX, touchY;
            if (e.touches) { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; }
            else { touchX = e.clientX; touchY = e.clientY; }
            let rect = stage.getBoundingClientRect();
            let clickX = touchX - rect.left, clickY = touchY - rect.top;

            for (let i = meteorList.length - 1; i >= 0; i--) {
                let m = meteorList[i], mRect = m.el.getBoundingClientRect();
                let mCenterX = mRect.left + mRect.width/2 - rect.left, mCenterY = mRect.top + mRect.height/2 - rect.top;
                let dist = Math.sqrt(Math.pow(clickX - mCenterX, 2) + Math.pow(clickY - mCenterY, 2));
                if (dist < pulseDestroyRadius) {
                    m.el.remove(); meteorList.splice(i, 1);
                    createExplosion(mCenterX, mCenterY);
                }
            }
        }

        stage.addEventListener('touchstart', handleTap, {passive: false});
        stage.addEventListener('mousedown', (e) => { if (!('ontouchstart' in window)) handleTap(e); });

        function spawnMeteor() {
            if (Math.random() < meteorSpawnRate) {
                let el = document.createElement('div'); el.className = 'meteor';
                let x = Math.random() * (stageW - 26);
                el.style.left = x + "px"; el.style.top = "-30px";
                stage.appendChild(el); meteorList.push({ el: el, y: -30 });
            }
        }

        function updateMeteors() {
            for (let i = meteorList.length - 1; i >= 0; i--) {
                let m = meteorList[i]; m.y += meteorSpeed; m.el.style.top = m.y + "px";
                if (m.y > stageH) { m.el.remove(); meteorList.splice(i, 1); continue; }
                let pRect = player.getBoundingClientRect(), mRect = m.el.getBoundingClientRect();
                let dist = Math.sqrt(Math.pow((pRect.left+19)-(mRect.left+13),2)+Math.pow((pRect.top+19)-(mRect.top+13),2));
                if (dist < 28) { gameOver("COLISIÓN DETECTADA."); return; }
            }
        }

        function gameLoop(timestamp) {
            if (!active) return;
            let dt = (timestamp - lastTimestamp) / 1000; lastTimestamp = timestamp;
            playerVelY -= gravity; playerVelY *= friction; playerY += playerVelY;
            player.style.bottom = playerY + "px";
            if (playerVelY > 0) {
                starY.far += playerVelY * 0.01; starY.mid += playerVelY * 0.05; starY.near += playerVelY * 0.2;
                starsFar.style.transform = `translateY(${starY.far % stageH}px)`;
                starsMid.style.transform = `translateY(${starY.mid % stageH}px)`;
                starsNear.style.transform = `translateY(${starY.near % stageH}px)`;
            }
            spawnMeteor(); updateMeteors();
            let currentVisualY = stageH - playerY - 19;
            let progress = 1 - ((currentVisualY - finishLineY) / (startBallY - finishLineY));
            altitudeTxt.innerText = `PARSEC: ${Math.max(0, progress * 50).toFixed(1)}`;
            if (playerY <= deathLineY) { gameOver("CAÍSTE AL VACÍO."); return; }
            if (currentVisualY <= finishLineY) { gameOver("¡NIVEL COMPLETADO!", true); return; }
            requestAnimationFrame(gameLoop);
        }

        function gameOver(msg, win = false) {
            active = false; appReady = false;
            setTimeout(() => { alert(msg); overlay.style.display = "flex"; }, 100);
        }

        function createExplosion(x, y) {
            let ex = document.createElement('div');
            ex.style.cssText = `position:absolute;width:5px;height:5px;background:white;border-radius:50%;left:${x}px;top:${y}px;transform:translate(-50%,-50%);transition:all 0.25s;z-index:35;box-shadow:0 0 15px white;`;
            stage.appendChild(ex);
            requestAnimationFrame(() => { ex.style.transform = 'translate(-50%,-50%) scale(12)'; ex.style.opacity = '0'; });
            setTimeout(() => ex.remove(), 250);
        }
    </script>
</body>
</html>
