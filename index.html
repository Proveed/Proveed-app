<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#0A0A0A; --rojo:#FF4D4D; }
  html,body{ height:100%; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  body{ background:var(--negro); display:flex; align-items:center; justify-content:center; padding:24px; }
  body::before{ content:''; position:fixed; inset:0; background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(168,230,61,0.08) 0%, transparent 60%); pointer-events:none; }
  .card{ width:100%; max-width:400px; background:#111; border-radius:24px; padding:36px 28px; border:1px solid #1e1e1e; }
  .logo-wrap{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .logo-hex{ width:36px; height:36px; }
  .logo-text{ font-size:1.2rem; font-weight:800; color:white; }
  .logo-text span{ color:var(--verde); }
  .admin-badge{ display:inline-block; background:rgba(168,230,61,0.12); color:var(--verde); font-size:0.68rem; font-weight:700; padding:3px 10px; border-radius:20px; margin-bottom:28px; border:1px solid rgba(168,230,61,0.2); }
  .card-title{ font-size:1.4rem; font-weight:800; color:white; margin-bottom:6px; }
  .card-sub{ font-size:0.85rem; color:#555; margin-bottom:28px; }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:0.7rem; font-weight:700; color:#555; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
  .field input{ width:100%; padding:13px 15px; background:#1a1a1a; border:1.5px solid #222; border-radius:13px; outline:none; font-family:'Inter',sans-serif; font-size:0.95rem; color:white; transition:border-color 0.2s; }
  .field input:focus{ border-color:var(--verde); }
  .field input::placeholder{ color:#444; }
  .btn-login{ width:100%; padding:15px; background:var(--verde); color:var(--negro); border:none; border-radius:14px; font-family:'Inter',sans-serif; font-size:0.95rem; font-weight:800; cursor:pointer; margin-top:8px; transition:0.2s; }
  .btn-login:active{ transform:scale(0.98); }
  .btn-login:disabled{ opacity:0.5; cursor:not-allowed; }
  .error-msg{ display:none; background:rgba(255,77,77,0.1); border:1px solid rgba(255,77,77,0.3); border-radius:12px; padding:11px 14px; font-size:0.82rem; color:var(--rojo); margin-bottom:16px; }
  .error-msg.show{ display:block; }
  .security-note{ display:flex; align-items:center; gap:8px; margin-top:20px; font-size:0.72rem; color:#444; }
  .security-note svg{ width:14px; height:14px; stroke:#555; fill:none; stroke-width:2; flex-shrink:0; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <svg class="logo-hex" viewBox="0 0 100 100">
      <defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#A8E63D"/><stop offset="100%" style="stop-color:#7BC820"/></linearGradient></defs>
      <path d="M50 4 L93 28 V72 L50 96 L7 72 V28 Z" fill="url(#g1)"/>
      <path d="M30 52 L44 66 L70 36" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <div class="logo-text">PRO<span>VEED</span></div>
  </div>
  <div class="admin-badge">⚡ Super Admin</div>
  <div class="card-title">Panel de Control</div>
  <div class="card-sub">Acceso restringido solo al administrador</div>
  <div class="error-msg" id="error-msg">Acceso denegado. Solo el administrador puede entrar.</div>
  <div class="field">
    <label>Correo electrónico</label>
    <input type="email" id="email" placeholder="proveed30@gmail.com">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>
  <button class="btn-login" id="btn-login" onclick="doLogin()">ENTRAR AL PANEL →</button>
  <div class="security-note">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Acceso encriptado y protegido
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
  authDomain:"proveed-8cb7c.firebaseapp.com",
  projectId:"proveed-8cb7c",
  storageBucket:"proveed-8cb7c.firebasestorage.app",
  messagingSenderId:"235073250367",
  appId:"1:235073250367:web:89ec59fea5f0b8a347448a"
});
const auth = getAuth(app);
const ADMIN_EMAIL = 'proveed30@gmail.com';

window.doLogin = async function() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('error-msg');
  err.classList.remove('show');
  if (!email || !pass) { err.textContent = 'Completa todos los campos.'; err.classList.add('show'); return; }
  if (email !== ADMIN_EMAIL) { err.textContent = 'Acceso denegado. Solo el administrador puede entrar.'; err.classList.add('show'); return; }
  btn.disabled = true; btn.textContent = 'Verificando...';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    window.location.href = 'dashboard.html';
  } catch(e) {
    err.textContent = 'Contraseña incorrecta.';
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'ENTRAR AL PANEL →';
  }
};

document.addEventListener('keydown', e => { if (e.key === 'Enter') window.doLogin(); });
</script>
</body>
</html>
