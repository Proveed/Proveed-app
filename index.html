<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOCH: GALACTIC JOURNEY</title>
    <style>
        :root {
            --primary: #32ff7e; --danger: #ff3e3e;
            --earth-ocean: #1e90ff; --earth-land: #2ecc71;
            --text: #ffffff;
        }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body {
            margin: 0; padding: 0; background-color: #000;
            background-image: radial-gradient(circle at center, #0a0a2a 0%, #000 100%);
            color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* HUD */
        #hud {
            position: absolute; top: 15px; left: 5%; width: 90%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.07); padding: 12px 20px;
            border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); z-index: 100;
        }
        #level-info { font-size: 14px; font-weight: 900; color: var(--primary); letter-spacing: 1px; }
        #altitude { font-size: 16px; font-weight: bold; color: #fff; }

        /* Barra de Progreso del Nivel */
        #progress-container {
            position: absolute; top: 85px; left: 10%; width: 80%; height: 4px;
            background: rgba(255,255,255,0.1); border-radius: 2px; z-index: 100;
        }
        #progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s; }

        #stage { position: relative; width: 100vw; flex-grow: 1; overflow: hidden; }

        .barrier { position: absolute; width: 100%; height: 4px; z-index: 50; }
        #finish-line { top: 40px; background: var(--primary); box-shadow: 0 0 20px var(--primary); }
        #death-line { bottom: 10px; background: var(--danger); box-shadow: 0 0 20px var(--danger); }

        /* Tierra SVG */
        #player {
            position: absolute; width: 55px; height: 55px; z-index: 60;
            bottom: 100px; left: 50%; transform: translate(-50%, 0);
            border-radius: 50%; box-shadow: 0 0 25px rgba(30, 144, 255, 0.5);
            transition: transform 0.1s;
        }
        #player.light { box-shadow: 0 0 40px #fff; transform: translate(-50%, 0) scale(1.1); }

        .meteor {
            position: absolute; width: 35px; height: 35px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 5 L80 30 L90 70 L50 95 L10 70 L20 30 Z" fill="%23444" stroke="%23ff9f1a" stroke-width="4"/></svg>');
            background-size: cover; z-index: 40; box-shadow: 0 0 15px #ff4500;
        }

        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 40px;
        }
        .btn {
            padding: 18px 45px; background: var(--primary); color: #000;
            border: none; font-weight: 900; border-radius: 8px; cursor: pointer;
            text-transform: uppercase; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 id="title" style="color:var(--primary); font-size: 40px; margin-bottom: 5px;">TOCH</h1>
        <h2 id="subtitle" style="margin-bottom: 30px; font-size: 14px; letter-spacing: 2px;">GALACTIC ASCENSION</h2>
        <p id="msg" style="max-width: 300px; color: #ccc; font-size: 14px;">Toca para elevar la Tierra y alcanzar la órbita segura.</p>
        <button class="btn" id="startBtn">INICIAR MISIÓN</button>
    </div>

    <div id="hud">
        <div id="level-info">NIVEL 1</div>
        <div id="altitude">0% COMPLETADO</div>
    </div>
    <div id="progress-container"><div id="progress-bar"></div></div>

    <div id="stage">
        <div class="barrier" id="finish-line"></div>
        <div id="player">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="48" fill="var(--earth-ocean)"/>
                <path d="M20,30 Q30,20 45,25 Q55,15 70,20 L85,40 Q70,55 50,50 Q35,65 20,50 Z" fill="var(--earth-land)"/>
                <path d="M40,60 Q50,85 30,90 Q15,80 25,65 Z" fill="var(--earth-land)"/>
                <path d="M65,55 Q85,75 75,90 Q60,85 60,70 Z" fill="var(--earth-land)"/>
            </svg>
        </div>
        <div class="barrier" id="death-line"></div>
    </div>

    <script>
        const player = document.getElementById('player'), stage = document.getElementById('stage');
        const levelInfo = document.getElementById('level-info'), altitudeTxt = document.getElementById('altitude');
        const progressBar = document.getElementById('progress-bar'), startBtn = document.getElementById('startBtn');
        const overlay = document.getElementById('overlay'), msg = document.getElementById('msg');

        // Configuración de niveles
        let currentLevel = 1;
        let progress = 0; 
        let gameActive = false, physicsActive = false;
        let playerY = 100, playerVelY = 0;
        let meteorList = [];

        // Parámetros que cambian con el nivel
        let config = {
            gravity: 0.5,
            impulse: 18,
            targetDistance: 600, // Qué tan largo es el nivel
            meteorFreq: 0.02
        };

        function updateLevelConfig() {
            config.gravity = 0.45 + (currentLevel * 0.03); // Sube gravedad
            config.impulse = 18 + (currentLevel * 0.2);   // Sube fuerza un poco
            config.targetDistance = 500 + (currentLevel * 300); // Niveles más largos
            config.meteorFreq = currentLevel > 3 ? 0.02 + (currentLevel * 0.005) : 0;
            levelInfo.innerText = `NIVEL ${currentLevel}`;
        }

        startBtn.onclick = () => {
            overlay.style.display = 'none';
            gameActive = true;
            physicsActive = false;
            resetPlayer();
        };

        function resetPlayer() {
            playerY = 100; playerVelY = 0; progress = 0;
            player.style.bottom = playerY + "px";
            progressBar.style.width = "0%";
            meteorList.forEach(m => m.el.remove());
            meteorList = [];
        }

        function handleTap(e) {
            if (!gameActive) return;
            if (e.cancelable) e.preventDefault();
            if (!physicsActive) { physicsActive = true; requestAnimationFrame(gameLoop); }

            playerVelY += config.impulse;

            // Destruir meteoros cercanos
            let rect = stage.getBoundingClientRect();
            let tx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            let ty = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

            for (let i = meteorList.length - 1; i >= 0; i--) {
                let m = meteorList[i], mRect = m.el.getBoundingClientRect();
                let mx = mRect.left + 17 - rect.left, my = mRect.top + 17 - rect.top;
                if (Math.sqrt((tx-mx)**2 + (ty-my)**2) < 120) {
                    m.el.remove(); meteorList.splice(i, 1);
                    activateLightEffect();
                }
            }
        }

        function activateLightEffect() {
            player.classList.add('light');
            setTimeout(() => player.classList.remove('light'), 200);
            playerVelY += 2; // Pequeño empujón extra al destruir
        }

        stage.addEventListener('touchstart', handleTap, {passive:false});
        stage.addEventListener('mousedown', handleTap);

        function gameLoop() {
            if (!physicsActive) return;

            playerVelY -= config.gravity;
            playerVelY *= 0.97; // fricción
            playerY += playerVelY;
            player.style.bottom = playerY + "px";

            // Progreso del nivel basado en cuánto tiempo te mantienes arriba
            if (playerY > 200) { 
                progress += 1;
                let perc = (progress / config.targetDistance) * 100;
                progressBar.style.width = Math.min(perc, 100) + "%";
                altitudeTxt.innerText = Math.floor(perc) + "% COMPLETADO";

                if (perc >= 100) return winLevel();
            }

            // Obstáculos
            if (Math.random() < config.meteorFreq) spawnMeteor();
            updateMeteors();

            // Muerte
            if (playerY <= 15) return gameOver("LA TIERRA CAYÓ AL VACÍO.");
            
            requestAnimationFrame(gameLoop);
        }

        function spawnMeteor() {
            let el = document.createElement('div'); el.className = 'meteor';
            el.style.left = Math.random() * (window.innerWidth - 40) + "px";
            el.style.top = "-40px";
            stage.appendChild(el);
            meteorList.push({ el, y: -40 });
        }

        function updateMeteors() {
            for (let i = meteorList.length - 1; i >= 0; i--) {
                let m = meteorList[i]; m.y += 4; m.el.style.top = m.y + "px";
                if (m.y > window.innerHeight) { m.el.remove(); meteorList.splice(i,1); continue; }
                let pR = player.getBoundingClientRect(), mR = m.el.getBoundingClientRect();
                if (Math.sqrt((pR.left+27-mR.left-17)**2 + (pR.top+27-mR.top-17)**2) < 40) {
                    gameOver("¡IMPACTO DE METEORITO!");
                }
            }
        }

        function winLevel() {
            physicsActive = false;
            currentLevel++;
            updateLevelConfig();
            overlay.style.display = 'flex';
            document.getElementById('title').innerText = "¡ÓRBITA ALCANZADA!";
            msg.innerText = `Prepárate para el Nivel ${currentLevel}. La gravedad es mayor.`;
            startBtn.innerText = "SIGUIENTE NIVEL";
        }

        function gameOver(reason) {
            physicsActive = false;
            overlay.style.display = 'flex';
            document.getElementById('title').innerText = "MISIÓN FALLIDA";
            msg.innerText = reason;
            startBtn.innerText = "REINTENTAR NIVEL";
        }

        updateLevelConfig();
    </script>
</body>
</html>
