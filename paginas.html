<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED Admin — Páginas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#0A0A0A; --rojo:#FF4D4D; --azul:#007AFF; }
  body{ background:var(--negro); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  .sidebar{ position:fixed; left:0; top:0; bottom:0; width:220px; background:#111; border-right:1px solid #1e1e1e; padding:28px 16px; z-index:200; display:none; flex-direction:column; gap:4px; }
  @media(min-width:768px){ .sidebar{ display:flex; } body{ padding-left:220px; padding-bottom:20px; } .tab-bar{ display:none; } }
  .sidebar-logo{ display:flex; align-items:center; gap:8px; margin-bottom:28px; padding:0 8px; }
  .sidebar-logo svg{ width:28px; height:28px; }
  .sidebar-logo-text{ font-size:1rem; font-weight:800; color:white; }
  .sidebar-logo-text span{ color:var(--verde); }
  .nav-item{ display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:12px; cursor:pointer; text-decoration:none; color:#555; font-size:0.82rem; font-weight:600; transition:0.2s; }
  .nav-item.active{ background:#1e1e1e; color:white; }
  .nav-item svg{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; flex-shrink:0; }
  .nav-section{ font-size:0.6rem; font-weight:700; color:#333; text-transform:uppercase; letter-spacing:1px; padding:12px 12px 4px; }
  .sidebar-bottom{ margin-top:auto; }
  .btn-logout{ display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:12px; cursor:pointer; color:#555; font-size:0.82rem; font-weight:600; border:none; background:transparent; width:100%; }
  .btn-logout svg{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; }
  .page-header{ padding:48px 20px 20px; display:flex; align-items:center; justify-content:space-between; }
  @media(min-width:768px){ .page-header{ padding:28px 28px 20px; } }
  .page-title{ font-size:1.4rem; font-weight:800; color:white; }
  .page-sub{ font-size:0.8rem; color:#555; margin-top:2px; }
  .btn-nueva{ background:var(--verde); color:var(--negro); border:none; padding:10px 16px; border-radius:12px; font-family:'Inter',sans-serif; font-weight:700; font-size:0.82rem; cursor:pointer; }
  .paginas-grid{ display:grid; grid-template-columns:1fr; gap:12px; padding:0 20px; }
  @media(min-width:768px){ .paginas-grid{ grid-template-columns:repeat(2,1fr); padding:0 28px; } }
  .pagina-card{ background:#111; border:1px solid #1e1e1e; border-radius:18px; padding:18px; transition:0.2s; }
  .pagina-card:hover{ border-color:#333; }
  .pag-header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .pag-icon{ width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .pag-icon svg{ width:22px; height:22px; fill:none; stroke-width:2; }
  .pag-nombre{ font-size:0.92rem; font-weight:700; color:white; }
  .pag-url{ font-size:0.72rem; color:#555; margin-top:2px; }
  .pag-desc{ font-size:0.8rem; color:#555; line-height:1.5; margin-bottom:12px; }
  .pag-meta{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .pag-tag{ font-size:0.62rem; font-weight:700; padding:3px 8px; border-radius:6px; background:#1e1e1e; color:#666; }
  .pag-tag.activo{ background:rgba(168,230,61,0.1); color:#3a7a00; }
  .pag-actions{ display:flex; gap:8px; }
  .pag-btn{ flex:1; padding:9px; border-radius:10px; border:none; font-family:'Inter',sans-serif; font-size:0.76rem; font-weight:700; cursor:pointer; }
  .btn-editar{ background:#1e1e1e; color:#aaa; }
  .btn-ver-pag{ background:rgba(0,122,255,0.1); color:var(--azul); }
  .btn-eliminar{ background:rgba(255,77,77,0.08); color:var(--rojo); flex:0; padding:9px 14px; }

  /* MODAL */
  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; z-index:500; align-items:flex-end; justify-content:center; }
  .modal-overlay.show{ display:flex; }
  .modal-sheet{ background:#111; width:100%; max-width:600px; border-radius:24px 24px 0 0; padding:24px 20px 36px; transform:translateY(100%); transition:0.4s cubic-bezier(0.16,1,0.3,1); border:1px solid #1e1e1e; border-bottom:none; max-height:85vh; overflow-y:auto; }
  .modal-overlay.show .modal-sheet{ transform:translateY(0); }
  .drag{ width:36px; height:4px; background:#333; border-radius:4px; margin:0 auto 20px; }
  .modal-title{ font-size:1rem; font-weight:700; color:white; margin-bottom:20px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:0.7rem; font-weight:700; color:#555; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
  .field input,.field textarea,.field select{ width:100%; padding:12px 14px; background:#1a1a1a; border:1px solid #222; border-radius:12px; outline:none; font-family:'Inter',sans-serif; font-size:0.9rem; color:white; -webkit-appearance:none; }
  .field input:focus,.field textarea:focus{ border-color:var(--verde); }
  .field textarea{ resize:none; height:100px; line-height:1.5; }
  .btn-crear-pag{ width:100%; padding:14px; background:var(--verde); color:var(--negro); border:none; border-radius:14px; font-family:'Inter',sans-serif; font-size:0.95rem; font-weight:800; cursor:pointer; margin-top:8px; }

  .empty{ text-align:center; padding:48px 20px; color:#444; font-size:0.85rem; }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:#111; display:flex; justify-content:space-around; align-items:center; padding:10px 0 22px; border-top:1px solid #1e1e1e; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; flex:1; color:#444; text-decoration:none; }
  .tab.active{ color:var(--verde); }
  .tab svg{ width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; }
  .tab span{ font-size:0.52rem; font-weight:600; text-transform:uppercase; }
</style>
</head>
<body>

  <div class="nav-section">Principal</div>
  <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
  <a class="nav-item" href="usuarios.html"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Usuarios</a>
  <a class="nav-item" href="productos.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Productos</a>
  <a class="nav-item" href="pedidos.html"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>Pedidos</a>
  <a class="nav-item" href="mensajes.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Mensajes</a>
  <div class="nav-section">Herramientas</div>
  <a class="nav-item" href="editor.html"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Editor Visual</a>
  <a class="nav-item active" href="paginas.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Páginas</a>
  <a class="nav-item" href="biblioteca.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Biblioteca</a>
  <div class="sidebar-bottom"><button class="btn-logout" onclick="cerrarSesion()"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar sesión</button></div>
</nav>

<div class="page-header">
  <div><div class="page-title">Páginas</div><div class="page-sub">Gestiona y crea secciones de la app</div></div>
  <button class="btn-nueva" onclick="abrirModal()">+ Nueva página</button>
</div>

<div class="paginas-grid" id="paginas-grid">
  <div class="empty">Cargando páginas...</div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal-sheet">
    <div class="drag"></div>
    <div class="modal-title">Nueva Página</div>
    <div class="field"><label>Nombre de la página</label><input type="text" id="pag-nombre" placeholder="Ej: Página de ofertas"></div>
    <div class="field"><label>URL / Archivo</label><input type="text" id="pag-url" placeholder="Ej: ofertas.html"></div>
    <div class="field"><label>Descripción</label><textarea id="pag-desc" placeholder="¿Para qué sirve esta página?"></textarea></div>
    <div class="field"><label>Portal</label><select id="pag-portal"><option value="emprendedor">Emprendedor</option><option value="proveedor">Proveedor</option><option value="ambos">Ambos</option></select></div>
    <div class="field"><label>Ícono (emoji)</label><input type="text" id="pag-icon" placeholder="Ej: 🎯" maxlength="2"></div>
    <button class="btn-crear-pag" onclick="crearPagina()">CREAR PÁGINA →</button>
  </div>
</div>

<nav class="tab-bar">
  <a class="tab" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Inicio</span></a>
  <a class="tab" href="usuarios.html"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>Usuarios</span></a>
  <a class="tab" href="pedidos.html"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg><span>Pedidos</span></a>
  <a class="tab" href="mensajes.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Mensajes</span></a>
  <a class="tab active" href="paginas.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>Páginas</span></a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
const app = initializeApp({ apiKey:"AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", authDomain:"proveed-8cb7c.firebaseapp.com", projectId:"proveed-8cb7c", storageBucket:"proveed-8cb7c.firebasestorage.app", messagingSenderId:"235073250367", appId:"1:235073250367:web:89ec59fea5f0b8a347448a" });
const auth = getAuth(app); const db = getFirestore(app);
const ADMIN_EMAIL = 'proveed30@gmail.com';

const PAGINAS_BASE = [
  { nombre:'Dashboard Emprendedor', url:'dashboard.html', desc:'Página de inicio del emprendedor con productos, tips y categorías', portal:'emprendedor', icon:'🏠', activo:true, base:true },
  { nombre:'Explorar Productos', url:'explorar.html', desc:'Catálogo de todos los productos activos', portal:'emprendedor', icon:'🔍', activo:true, base:true },
  { nombre:'Tips', url:'tips.html', desc:'Feed de videos estilo reels de proveedores', portal:'emprendedor', icon:'🎥', activo:true, base:true },
  { nombre:'Carrito', url:'carrito.html', desc:'Carrito de compras del emprendedor', portal:'emprendedor', icon:'🛒', activo:true, base:true },
  { nombre:'Busqueda', url:'busqueda.html', desc:'Búsqueda avanzada con filtros', portal:'emprendedor', icon:'🔎', activo:true, base:true },
  { nombre:'Dashboard Proveedor', url:'dashboard.html', desc:'Panel de control del proveedor', portal:'proveedor', icon:'📊', activo:true, base:true },
  { nombre:'Mis Productos', url:'productos.html', desc:'Gestión de productos del proveedor', portal:'proveedor', icon:'📦', activo:true, base:true },
  { nombre:'Tips Proveedor', url:'tips.html', desc:'Subir y gestionar tips de video', portal:'proveedor', icon:'🎬', activo:true, base:true },
];

onAuthStateChanged(auth, user => { if (!user || user.email !== ADMIN_EMAIL) { window.location.href = 'index.html'; return; } cargarPaginas(); });

async function cargarPaginas() {
  const snap = await getDocs(collection(db, 'paginas_custom'));
  const custom = snap.docs.map(d => ({ id: d.id, ...d.data(), base: false }));
  const todas = [...PAGINAS_BASE, ...custom];
  const grid = document.getElementById('paginas-grid');
  grid.innerHTML = '';
  todas.forEach(p => {
    const div = document.createElement('div'); div.className = 'pagina-card';
    const portalColor = p.portal === 'emprendedor' ? 'rgba(168,230,61,0.12)' : p.portal === 'proveedor' ? 'rgba(255,140,0,0.12)' : 'rgba(0,122,255,0.12)';
    div.innerHTML = `
      <div class="pag-header">
        <div class="pag-icon" style="background:${portalColor};font-size:1.3rem;">${p.icon || '📄'}</div>
        <div><div class="pag-nombre">${p.nombre}</div><div class="pag-url">${p.url}</div></div>
      </div>
      <div class="pag-desc">${p.desc || 'Sin descripción'}</div>
      <div class="pag-meta">
        <span class="pag-tag ${p.activo ? 'activo' : ''}">${p.activo ? 'Activa' : 'Inactiva'}</span>
        <span class="pag-tag">${p.portal}</span>
        ${p.base ? '<span class="pag-tag">Base</span>' : '<span class="pag-tag">Personalizada</span>'}
      </div>
      <div class="pag-actions">
        <button class="pag-btn btn-editar">✏️ Editar</button>
        ${!p.base ? `<button class="pag-btn btn-eliminar" onclick="eliminarPagina('${p.id}')">🗑</button>` : ''}
      </div>`;
    grid.appendChild(div);
  });
}

window.abrirModal = () => document.getElementById('modal-overlay').classList.add('show');
window.cerrarModal = e => { if (e.target === document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('show'); };

window.crearPagina = async function() {
  const nombre = document.getElementById('pag-nombre').value.trim();
  const url = document.getElementById('pag-url').value.trim();
  const desc = document.getElementById('pag-desc').value.trim();
  const portal = document.getElementById('pag-portal').value;
  const icon = document.getElementById('pag-icon').value.trim() || '📄';
  if (!nombre || !url) { alert('Nombre y URL son obligatorios'); return; }
  await addDoc(collection(db, 'paginas_custom'), { nombre, url, desc, portal, icon, activo: true, creadoEn: serverTimestamp() });
  document.getElementById('modal-overlay').classList.remove('show');
  cargarPaginas();
};

window.eliminarPagina = async function(id) {
  if (!confirm('¿Eliminar esta página personalizada?')) return;
  await deleteDoc(doc(db, 'paginas_custom', id));
  cargarPaginas();
};

window.cerrarSesion = async function() { await signOut(auth); window.location.href = 'index.html'; };
</script>
</body>
</html>
