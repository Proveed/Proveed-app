<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROVEED Admin — Usuarios</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#0A0A0A; --rojo:#FF4D4D; --azul:#007AFF; }
  body{ background:var(--negro); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }
  .sidebar{ position:fixed; left:0; top:0; bottom:0; width:220px; background:#111; border-right:1px solid #1e1e1e; padding:28px 16px; z-index:200; display:none; flex-direction:column; gap:4px; }
  @media(min-width:768px){ .sidebar{ display:flex; } body{ padding-left:220px; padding-bottom:20px; } .tab-bar{ display:none; } }
  .sidebar-logo{ display:flex; align-items:center; gap:8px; margin-bottom:28px; padding:0 8px; }
  .sidebar-logo svg{ width:28px; height:28px; }
  .sidebar-logo-text{ font-size:1rem; font-weight:800; color:white; }
  .sidebar-logo-text span{ color:var(--verde); }
  .nav-item{ display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:12px; cursor:pointer; text-decoration:none; color:#555; font-size:0.82rem; font-weight:600; transition:0.2s; }
  .nav-item:hover{ background:#1a1a1a; color:#aaa; }
  .nav-item.active{ background:#1e1e1e; color:white; }
  .nav-item svg{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; flex-shrink:0; }
  .nav-section{ font-size:0.6rem; font-weight:700; color:#333; text-transform:uppercase; letter-spacing:1px; padding:12px 12px 4px; }
  .sidebar-bottom{ margin-top:auto; }
  .btn-logout{ display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:12px; cursor:pointer; color:#555; font-size:0.82rem; font-weight:600; border:none; background:transparent; width:100%; }
  .btn-logout svg{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; }
  .page-header{ padding:48px 20px 16px; }
  @media(min-width:768px){ .page-header{ padding:28px 28px 16px; } }
  .page-title{ font-size:1.4rem; font-weight:800; color:white; }
  .page-sub{ font-size:0.8rem; color:#555; margin-top:2px; }
  .tabs-row{ display:flex; gap:8px; padding:0 20px 16px; overflow-x:auto; scrollbar-width:none; }
  @media(min-width:768px){ .tabs-row{ padding:0 28px 16px; } }
  .vtab{ padding:8px 16px; border-radius:20px; border:1px solid #222; background:transparent; color:#555; font-size:0.78rem; font-weight:600; cursor:pointer; white-space:nowrap; font-family:'Inter',sans-serif; transition:0.2s; }
  .vtab.active{ background:#1e1e1e; color:white; border-color:#333; }
  .search-wrap{ margin:0 20px 16px; background:#111; border:1px solid #1e1e1e; border-radius:13px; padding:11px 14px; display:flex; align-items:center; gap:10px; }
  @media(min-width:768px){ .search-wrap{ margin:0 28px 16px; } }
  .search-wrap input{ flex:1; background:transparent; border:none; outline:none; color:white; font-family:'Inter',sans-serif; font-size:0.9rem; }
  .search-wrap input::placeholder{ color:#444; }
  .search-wrap svg{ width:16px; height:16px; stroke:#444; fill:none; stroke-width:2.5; flex-shrink:0; }
  .usuarios-lista{ padding:0 20px; }
  @media(min-width:768px){ .usuarios-lista{ padding:0 28px; } }
  .user-card{ background:#111; border:1px solid #1e1e1e; border-radius:16px; padding:16px; margin-bottom:10px; display:flex; gap:14px; align-items:center; cursor:pointer; transition:0.2s; }
  .user-card:hover{ border-color:#333; }
  .user-avatar{ width:46px; height:46px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; font-weight:800; flex-shrink:0; }
  .user-info{ flex:1; min-width:0; }
  .user-name{ font-size:0.9rem; font-weight:700; color:white; }
  .user-email{ font-size:0.74rem; color:#555; margin-top:2px; }
  .user-meta{ display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; }
  .user-tag{ font-size:0.62rem; font-weight:700; padding:2px 8px; border-radius:6px; }
  .tag-emp{ background:rgba(168,230,61,0.1); color:var(--verde); }
  .tag-prov{ background:rgba(255,140,0,0.1); color:var(--naranja); }
  .tag-activo{ background:rgba(168,230,61,0.08); color:#5a9a00; }
  .tag-inactivo{ background:rgba(255,77,77,0.1); color:var(--rojo); }
  .user-actions{ display:flex; flex-direction:column; gap:6px; align-items:flex-end; flex-shrink:0; }
  .action-btn{ border:none; border-radius:8px; padding:6px 12px; font-size:0.7rem; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; white-space:nowrap; }
  .btn-toggle-on{ background:rgba(255,77,77,0.1); color:var(--rojo); }
  .btn-toggle-off{ background:rgba(168,230,61,0.1); color:#3a7a00; }
  .btn-ver{ background:#1e1e1e; color:#aaa; }
  .stats-strip{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:0 20px 16px; }
  @media(min-width:768px){ .stats-strip{ padding:0 28px 16px; grid-template-columns:repeat(3,1fr); max-width:500px; } }
  .stat-mini{ background:#111; border:1px solid #1e1e1e; border-radius:14px; padding:14px; text-align:center; }
  .stat-mini-val{ font-size:1.3rem; font-weight:800; color:white; }
  .stat-mini-lbl{ font-size:0.62rem; color:#555; font-weight:600; margin-top:3px; }
  .empty{ text-align:center; padding:48px 20px; color:#444; font-size:0.85rem; }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:#111; display:flex; justify-content:space-around; align-items:center; padding:10px 0 22px; border-top:1px solid #1e1e1e; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; flex:1; color:#444; text-decoration:none; }
  .tab.active{ color:var(--verde); }
  .tab svg{ width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; }
  .tab span{ font-size:0.52rem; font-weight:600; text-transform:uppercase; }
</style>
</head>
<body>

    <div class="sidebar-logo-text">PRO<span>VEED</span></div>
  </div>

  <a class="nav-item active" href="usuarios.html"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Usuarios</a>
  <a class="nav-item" href="productos.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Productos</a>
  <a class="nav-item" href="pedidos.html"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Pedidos</a>
  <a class="nav-item" href="mensajes.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Mensajes</a>

  <a class="nav-item" href="paginas.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Páginas</a>
  <a class="nav-item" href="biblioteca.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Biblioteca</a>

<div class="page-header">
  <div class="page-title">Usuarios</div>
  <div class="page-sub">Gestión de emprendedores y proveedores</div>
</div>

<div class="stats-strip">
  <div class="stat-mini"><div class="stat-mini-val" id="total-usuarios">—</div><div class="stat-mini-lbl">Total</div></div>
  <div class="stat-mini"><div class="stat-mini-val" id="total-emp" style="color:var(--verde)">—</div><div class="stat-mini-lbl">Emprendedores</div></div>
  <div class="stat-mini"><div class="stat-mini-val" id="total-prov" style="color:var(--naranja)">—</div><div class="stat-mini-lbl">Proveedores</div></div>
</div>

<div class="tabs-row">
  <button class="vtab active" onclick="filtrar('todos',this)">Todos</button>
  <button class="vtab" onclick="filtrar('emprendedor',this)">Emprendedores</button>
  <button class="vtab" onclick="filtrar('proveedor',this)">Proveedores</button>
  <button class="vtab" onclick="filtrar('activo',this)">Activos</button>
  <button class="vtab" onclick="filtrar('inactivo',this)">Inactivos</button>
</div>

<div class="search-wrap">
  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
  <input type="text" id="search-input" placeholder="Buscar por nombre o email..." oninput="buscar(this.value)">
</div>

<div class="usuarios-lista" id="usuarios-lista">
  <div class="empty">Cargando usuarios...</div>
</div>

  <a class="tab" href="mensajes.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Mensajes</span></a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8",
  authDomain:"proveed-8cb7c.firebaseapp.com",
  projectId:"proveed-8cb7c",
  storageBucket:"proveed-8cb7c.firebasestorage.app",
  messagingSenderId:"235073250367",
  appId:"1:235073250367:web:89ec59fea5f0b8a347448a"
});
const auth = getAuth(app);
const db = getFirestore(app);
const ADMIN_EMAIL = 'proveed30@gmail.com';
let todosUsuarios = [], filtroActual = 'todos', busquedaActual = '';

onAuthStateChanged(auth, user => {
  if (!user || user.email !== ADMIN_EMAIL) { window.location.href = 'index.html'; return; }
  cargarUsuarios();
});

async function cargarUsuarios() {
  try {
    const snap = await getDocs(collection(db, 'usuarios'));
    todosUsuarios = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const emp = todosUsuarios.filter(u => u.rol === 'emprendedor');
    const prov = todosUsuarios.filter(u => u.rol === 'proveedor');
    document.getElementById('total-usuarios').textContent = todosUsuarios.length;
    document.getElementById('total-emp').textContent = emp.length;
    document.getElementById('total-prov').textContent = prov.length;
    renderUsuarios();
  } catch(e) { console.warn(e); }
}
function renderUsuarios() {
  let lista = [...todosUsuarios];
  if (filtroActual === 'emprendedor') lista = lista.filter(u => u.rol === 'emprendedor');
  if (filtroActual === 'proveedor') lista = lista.filter(u => u.rol === 'proveedor');
  if (filtroActual === 'activo') lista = lista.filter(u => u.activo !== false);
  if (filtroActual === 'inactivo') lista = lista.filter(u => u.activo === false);
  if (busquedaActual) lista = lista.filter(u => (u.nombre || '').toLowerCase().includes(busquedaActual) || (u.email || '').toLowerCase().includes(busquedaActual) || (u.empresa || '').toLowerCase().includes(busquedaActual));
  const cont = document.getElementById('usuarios-lista');
  if (!lista.length) { cont.innerHTML = '<div class="empty">Sin usuarios en esta categoría</div>'; return; }
  cont.innerHTML = '';
  lista.forEach(u => {
    const div = document.createElement('div');
    div.className = 'user-card';
    const esEmp = u.rol === 'emprendedor';
    const activo = u.activo !== false;
    const nombre = u.empresa || u.nombre || 'Sin nombre';
    div.innerHTML = `
      <div class="user-avatar" style="background:${esEmp ? 'rgba(168,230,61,0.12)' : 'rgba(255,140,0,0.12)'};color:${esEmp ? 'var(--verde)' : 'var(--naranja)'};">${nombre[0].toUpperCase()}</div>
      <div class="user-info">
        <div class="user-name">${nombre}</div>
        <div class="user-email">${u.email || '—'} · ${u.ciudad || 'Sin ciudad'}</div>
        <div class="user-meta">
          <span class="user-tag ${esEmp ? 'tag-emp' : 'tag-prov'}">${esEmp ? 'Emprendedor' : 'Proveedor'}</span>
          <span class="user-tag ${activo ? 'tag-activo' : 'tag-inactivo'}">${activo ? 'Activo' : 'Inactivo'}</span>
        </div>
      </div>
      <div class="user-actions">
        <button class="action-btn ${activo ? 'btn-toggle-on' : 'btn-toggle-off'}" onclick="toggleUsuario('${u.id}',${activo})">${activo ? 'Desactivar' : 'Activar'}</button>
      </div>`;
    cont.appendChild(div);
  });
}

window.filtrar = function(f, el) {
  filtroActual = f;
  document.querySelectorAll('.vtab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderUsuarios();
};

window.buscar = function(v) {
  busquedaActual = v.toLowerCase().trim();
  renderUsuarios();
};

window.toggleUsuario = async function(id, activo) {
  await updateDoc(doc(db, 'usuarios', id), { activo: !activo });
  await cargarUsuarios();
};

window.cerrarSesion = async function() { await signOut(auth); window.location.href = 'index.html'; };
</script>
</body>
</html>
