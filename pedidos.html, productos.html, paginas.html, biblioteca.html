<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{ --verde:#A8E63D; --naranja:#FF8C00; --negro:#0A0A0A; --rojo:#FF4D4D; --azul:#007AFF; }
  body{ background:var(--negro); font-family:'Inter',sans-serif; padding-bottom:90px; -webkit-font-smoothing:antialiased; }

  @media(min-width:768px){ .sidebar{ display:flex; } body{ padding-left:220px; padding-bottom:20px; } .tab-bar{ display:none; } }
  .sidebar-logo{ display:flex; align-items:center; gap:8px; margin-bottom:28px; padding:0 8px; }
  .sidebar-logo svg{ width:28px; height:28px; }
  .sidebar-logo-text{ font-size:1rem; font-weight:800; color:white; }
  .sidebar-logo-text span{ color:var(--verde); }
  .nav-item{ display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:12px; cursor:pointer; text-decoration:none; color:#555; font-size:0.82rem; font-weight:600; transition:0.2s; }
  .nav-item.active{ background:#1e1e1e; color:white; }
  .nav-item svg{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; flex-shrink:0; }
  .nav-section{ font-size:0.6rem; font-weight:700; color:#333; text-transform:uppercase; letter-spacing:1px; padding:12px 12px 4px; }
  .sidebar-bottom{ margin-top:auto; }
  .btn-logout{ display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:12px; cursor:pointer; color:#555; font-size:0.82rem; font-weight:600; border:none; background:transparent; width:100%; }
  .btn-logout svg{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; }
  .page-header{ padding:48px 20px 16px; }
  @media(min-width:768px){ .page-header{ padding:28px 28px 16px; } }
  .page-title{ font-size:1.4rem; font-weight:800; color:white; }
  .page-sub{ font-size:0.8rem; color:#555; margin-top:2px; }
  .stats-strip{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:0 20px 16px; }
  @media(min-width:768px){ .stats-strip{ grid-template-columns:repeat(4,1fr); padding:0 28px 16px; } }
  .stat-mini{ background:#111; border:1px solid #1e1e1e; border-radius:14px; padding:14px; text-align:center; }
  .stat-mini-val{ font-size:1.3rem; font-weight:800; color:white; }
  .stat-mini-lbl{ font-size:0.62rem; color:#555; font-weight:600; margin-top:3px; }
  .tabs-row{ display:flex; gap:8px; padding:0 20px 16px; overflow-x:auto; scrollbar-width:none; }
  @media(min-width:768px){ .tabs-row{ padding:0 28px 16px; } }
  .vtab{ padding:8px 16px; border-radius:20px; border:1px solid #222; background:transparent; color:#555; font-size:0.78rem; font-weight:600; cursor:pointer; white-space:nowrap; font-family:'Inter',sans-serif; transition:0.2s; }
  .vtab.active{ background:#1e1e1e; color:white; border-color:#333; }
  .pedidos-lista{ padding:0 20px; }
  @media(min-width:768px){ .pedidos-lista{ padding:0 28px; } }
  .pedido-card{ background:#111; border:1px solid #1e1e1e; border-radius:16px; padding:16px; margin-bottom:10px; transition:0.2s; }
  .pedido-card:hover{ border-color:#333; }
  .ped-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .ped-num{ font-size:0.9rem; font-weight:800; color:white; }
  .ped-fecha{ font-size:0.72rem; color:#555; margin-top:2px; }
  .est-badge{ font-size:0.65rem; font-weight:700; padding:4px 10px; border-radius:20px; }
  .est-pendiente{ background:rgba(0,122,255,0.15); color:var(--azul); }
  .est-proceso{ background:rgba(255,140,0,0.15); color:var(--naranja); }
  .est-completado{ background:rgba(168,230,61,0.15); color:var(--verde); }
  .ped-info{ display:flex; gap:16px; margin-bottom:12px; flex-wrap:wrap; }
  .ped-info-item{ font-size:0.78rem; color:#555; }
  .ped-info-item b{ color:#aaa; display:block; }
  .ped-items-preview{ background:#1a1a1a; border-radius:10px; padding:10px 12px; margin-bottom:12px; }
  .ped-item-row{ display:flex; justify-content:space-between; font-size:0.78rem; color:#666; padding:3px 0; }
  .ped-item-row:first-child{ color:#aaa; }
  .ped-footer{ display:flex; align-items:center; justify-content:space-between; }
  .ped-total{ font-size:1rem; font-weight:800; color:var(--naranja); }
  .ped-actions{ display:flex; gap:6px; }
  .ped-btn{ padding:7px 14px; border-radius:9px; border:none; font-family:'Inter',sans-serif; font-size:0.74rem; font-weight:700; cursor:pointer; }
  .btn-completar{ background:rgba(168,230,61,0.12); color:#3a7a00; }
  .btn-proceso{ background:rgba(255,140,0,0.12); color:var(--naranja); }
  .empty{ text-align:center; padding:48px 20px; color:#444; font-size:0.85rem; }
  .tab-bar{ position:fixed; bottom:0; width:100%; background:#111; display:flex; justify-content:space-around; align-items:center; padding:10px 0 22px; border-top:1px solid #1e1e1e; z-index:200; }
  .tab{ display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; flex:1; color:#444; text-decoration:none; }
  .tab.active{ color:var(--verde); }
  .tab svg{ width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; }
  .tab span{ font-size:0.52rem; font-weight:600; text-transform:uppercase; }
</style>
</head>

</div>

  <button class="vtab active" onclick="filtrar('todos',this)">Todos</button>
  <button class="vtab" onclick="filtrar('pendiente',this)">Pendientes</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
const app = initializeApp({ apiKey:"AIzaSyAZQRlfdtJjmodrfmct5N3qrLO6hniO2o8", authDomain:"proveed-8cb7c.firebaseapp.com", projectId:"proveed-8cb7c", storageBucket:"proveed-8cb7c.firebasestorage.app", messagingSenderId:"235073250367", appId:"1:235073250367:web:89ec59fea5f0b8a347448a" });
const auth = getAuth(app); const db = getFirestore(app);
const ADMIN_EMAIL = 'proveed30@gmail.com';
let todosPedidos = [], filtroActual = 'todos';
onAuthStateChanged(auth, user => { if (!user || user.email !== ADMIN_EMAIL) { window.location.href = 'index.html'; return; } cargarPedidos(); });
async function cargarPedidos() {
  const snap = await getDocs(collection(db, 'pedidos'));
  todosPedidos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  todosPedidos.sort((a, b) => (b.creadoEn?.toMillis?.() || 0) - (a.creadoEn?.toMillis?.() || 0));
  const revenue = todosPedidos.reduce((s, p) => s + (p.total || 0), 0);
  document.getElementById('st-total').textContent = todosPedidos.length;
  document.getElementById('st-pendientes').textContent = todosPedidos.filter(p => p.estado === 'pendiente').length;
  document.getElementById('st-proceso').textContent = todosPedidos.filter(p => p.estado === 'proceso').length;
  document.getElementById('st-revenue').textContent = '$' + revenue.toFixed(0);
  renderPedidos();
}
function renderPedidos() {
  let lista = [...todosPedidos];
  if (filtroActual !== 'todos') lista = lista.filter(p => p.estado === filtroActual);
  const cont = document.getElementById('pedidos-lista');
  if (!lista.length) { cont.innerHTML = '<div class="empty">Sin pedidos en este estado</div>'; return; }
  cont.innerHTML = '';
  lista.forEach(p => {
    const div = document.createElement('div'); div.className = 'pedido-card';
    const est = p.estado || 'pendiente';
    const fecha = p.creadoEn ? new Date(p.creadoEn.toDate()).toLocaleString('es-EC', { day:'2-digit', month:'short', year:'numeric' }) : '—';
    const items = (p.items || []).slice(0, 3);
    div.innerHTML = `
      <div class="ped-header"><div><div class="ped-num">#PV-${p.id.slice(-6).toUpperCase()}</div><div class="ped-fecha">${fecha}</div></div><span class="est-badge est-${est}">${est}</span></div>
      <div class="ped-info">
        <div class="ped-info-item"><b>Cliente</b>${p.entrega?.nombre || '—'}</div>
        <div class="ped-info-item"><b>Ciudad</b>${p.entrega?.ciudad || '—'}</div>
        <div class="ped-info-item"><b>Pago</b>${p.metodoPago || '—'}</div>
        <div class="ped-info-item"><b>Items</b>${(p.items || []).length}</div>
      </div>
      <div class="ped-items-preview">${items.map(i => `<div class="ped-item-row"><span>${i.nombre}</span><span>$${(i.precio * i.cantidad).toFixed(2)}</span></div>`).join('')}${p.items?.length > 3 ? `<div class="ped-item-row" style="color:#444">+${p.items.length - 3} más...</div>` : ''}</div>
      <div class="ped-footer">
        <div class="ped-total">$${Number(p.total || 0).toFixed(2)}</div>
        <div class="ped-actions">
          ${est === 'pendiente' ? `<button class="ped-btn btn-proceso" onclick="cambiarEstado('${p.id}','proceso')">→ Proceso</button>` : ''}
          ${est === 'proceso' ? `<button class="ped-btn btn-completar" onclick="cambiarEstado('${p.id}','completado')">✓ Completar</button>` : ''}
        </div>
      </div>`;
    cont.appendChild(div);
  });
}
window.filtrar = function(f, el) { filtroActual = f; document.querySelectorAll('.vtab').forEach(t => t.classList.remove('active')); el.classList.add('active'); renderPedidos(); };
window.cambiarEstado = async function(id, estado) { await updateDoc(doc(db, 'pedidos', id), { estado }); cargarPedidos(); };
window.cerrarSesion = async function() { await signOut(auth); window.location.href = 'index.html'; };
</script>
</body>
